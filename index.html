<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buku Tanya — Chatbot AI</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background-color: #EDEAE3;
    font-family: Georgia, 'Times New Roman', serif;
    color: #2B2A28;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .app {
    width: 100%;
    max-width: 680px;
    height: 92vh;
    background-color: #F7F5F0;
    border: 1px solid #C9C2B4;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background-color: #EDEAE3;
    border-bottom: 1px solid #C9C2B4;
  }
  .header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.01em;
  }
  .header p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #7A7468;
    font-family: system-ui, sans-serif;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .entry { margin-bottom: 20px; }
  .meta {
    font-family: system-ui, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .meta .who { font-weight: 600; }
  .who.user { color: #3457D5; }
  .who.assistant { color: #7A7468; }
  .meta .time { color: #B3AC9C; margin-left: 8px; text-transform: none; letter-spacing: 0; }
  .text {
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    margin: 0;
  }
  .rule { border-bottom: 1px solid #DEDACD; margin-top: 16px; }
  .typing {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    font-style: italic;
    color: #B3AC9C;
    margin-top: 4px;
  }
  .input-bar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px;
    background-color: #EDEAE3;
    border-top: 1px solid #C9C2B4;
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid #C9C2B4;
    border-radius: 2px;
    padding: 10px 12px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    background-color: #F7F5F0;
    color: #2B2A28;
    outline: none;
  }
  button {
    background-color: #3457D5;
    color: white;
    border: none;
    border-radius: 2px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: system-ui, sans-serif;
    font-size: 14px;
  }
  button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <h1>Buku Tanya</h1>
      <p>catatan tanya-jawab hari ini</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="Tulis pertanyaan Anda…"></textarea>
    <button id="sendBtn">Kirim</button>
  </div>
</div>

<script>
  // PENTING: Ganti URL di bawah dengan endpoint backend Anda sendiri.
  // Memanggil api.anthropic.com langsung dari browser TIDAK aman untuk situs publik,
  // karena API key akan terlihat oleh semua pengunjung.
  // Buat backend kecil (Node.js/Express, Cloudflare Worker, dll) yang menyimpan
  // API key secara rahasia di server, lalu panggil endpoint backend itu di sini.
  const API_ENDPOINT = "/api/chat"; // ganti sesuai backend Anda

  const messages = [
    { role: "assistant", text: "Halo. Tulis pertanyaan apa saja di bawah — saya akan mencatatnya di sini.", time: currentTime() }
  ];

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function currentTime() {
    return new Date().toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
  }

  function render() {
    messagesEl.innerHTML = "";
    messages.forEach(m => {
      const entry = document.createElement("div");
      entry.className = "entry";
      entry.innerHTML = `
        <div class="meta">
          <span class="who ${m.role}">${m.role === "user" ? "Anda" : "Asisten"}</span>
          <span class="time">${m.time}</span>
        </div>
        <p class="text"></p>
        <div class="rule"></div>
      `;
      entry.querySelector(".text").textContent = m.text;
      messagesEl.appendChild(entry);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question) return;

    messages.push({ role: "user", text: question, time: currentTime() });
    inputEl.value = "";
    sendBtn.disabled = true;
    render();

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "Asisten sedang menulis…";
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const response = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: messages.map(m => ({ role: m.role, content: m.text }))
        })
      });
      const data = await response.json();
      const reply = data.reply || "Maaf, tidak ada jawaban.";
      messages.push({ role: "assistant", text: reply, time: currentTime() });
    } catch (err) {
      messages.push({ role: "assistant", text: "Terjadi gangguan saat menghubungi asisten. Coba lagi.", time: currentTime() });
    } finally {
      sendBtn.disabled = false;
      render();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  render();
</script>

</body>
</html>
